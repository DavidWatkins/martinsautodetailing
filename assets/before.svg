<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Car paint before detailing — dull and dusty">
  <defs>
    <linearGradient id="bPaint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C8786"/>
      <stop offset="0.5" stop-color="#5E6968"/>
      <stop offset="1" stop-color="#454E4E"/>
    </linearGradient>
    <linearGradient id="bHaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#AEB7B5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#AEB7B5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="bSwirl" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.75" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.78" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.82" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="700" fill="url(#bPaint)"/>
  <rect width="1000" height="320" fill="url(#bHaze)"/>
  <!-- body crease line -->
  <path d="M0 452 L1000 430" stroke="#3C4544" stroke-width="3" opacity="0.6"/>
  <path d="M0 449 L1000 427" stroke="#9AA3A1" stroke-width="1.5" opacity="0.3"/>
  <!-- door handle -->
  <rect x="600" y="300" width="170" height="58" rx="29" fill="#3E4746"/>
  <rect x="612" y="312" width="146" height="34" rx="17" fill="#525C5B"/>
  <rect x="624" y="320" width="92" height="12" rx="6" fill="#39423F" opacity="0.7"/>
  <!-- swirl marks -->
  <g>
    <circle cx="230" cy="250" r="60" fill="url(#bSwirl)"/>
    <circle cx="350" cy="430" r="80" fill="url(#bSwirl)"/>
    <circle cx="180" cy="520" r="55" fill="url(#bSwirl)"/>
    <circle cx="470" cy="200" r="70" fill="url(#bSwirl)"/>
    <circle cx="820" cy="540" r="66" fill="url(#bSwirl)"/>
  </g>
  <!-- dust + water spots -->
  <g fill="#C7CECB">
    <circle cx="140" cy="180" r="2.5" opacity="0.5"/>
    <circle cx="300" cy="140" r="3" opacity="0.45"/>
    <circle cx="430" cy="330" r="2" opacity="0.5"/>
    <circle cx="520" cy="480" r="3.4" opacity="0.4"/>
    <circle cx="690" cy="500" r="2.2" opacity="0.5"/>
    <circle cx="880" cy="220" r="2.8" opacity="0.4"/>
    <circle cx="760" cy="160" r="2" opacity="0.5"/>
    <circle cx="220" cy="600" r="2.6" opacity="0.45"/>
    <circle cx="560" cy="600" r="2" opacity="0.4"/>
    <circle cx="930" cy="470" r="2.4" opacity="0.45"/>
  </g>
  <g fill="none" stroke="#B7BFBC" stroke-width="2" opacity="0.28">
    <circle cx="410" cy="250" r="14"/>
    <circle cx="640" cy="430" r="18"/>
    <circle cx="300" cy="540" r="11"/>
  </g>
</svg>
