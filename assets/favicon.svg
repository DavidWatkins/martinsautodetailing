<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Martin's Auto Detailing">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22CDC1"/>
      <stop offset="1" stop-color="#0A857F"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#badge)"/>
  <rect x="2" y="2" width="60" height="34" rx="18" fill="url(#gloss)"/>
  <!-- car body -->
  <g fill="#ffffff">
    <rect x="11" y="35" width="42" height="9" rx="4.5"/>
    <path d="M21 35 L25.5 27.6 Q26.2 26.5 27.6 26.5 L37.4 26.5 Q39 26.5 39.9 27.8 L44 35 Z"/>
  </g>
  <!-- windows -->
  <path d="M26.4 34 L29.2 29.2 Q29.5 28.7 30.1 28.7 L33 28.7 L33 34 Z" fill="#0B8F88"/>
  <path d="M35 34 L35 28.7 L36.6 28.7 Q37.3 28.7 37.7 29.4 L40.4 34 Z" fill="#0B8F88"/>
  <!-- wheels -->
  <g>
    <circle cx="21" cy="44" r="5.4" fill="#ffffff"/>
    <circle cx="21" cy="44" r="2.3" fill="#0A857F"/>
    <circle cx="43" cy="44" r="5.4" fill="#ffffff"/>
    <circle cx="43" cy="44" r="2.3" fill="#0A857F"/>
  </g>
  <!-- shine sparkle -->
  <path d="M47 12 C48 17 49.6 18.6 54.6 19.6 C49.6 20.6 48 22.2 47 27.2 C46 22.2 44.4 20.6 39.4 19.6 C44.4 18.6 46 17 47 12 Z" fill="#EBFFFB"/>
  <circle cx="38.5" cy="13.5" r="1.4" fill="#EBFFFB"/>
</svg>
